name: Latest blog post workflow
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.lehuutrung.dev/rss.xml"
          max_post_count: 3
          committer_username: lehuutrungbot
          committer_email: 29777741+lehuutrungbot@users.noreply.github.com

